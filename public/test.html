<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Audio Test on iPhone</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px;
            background: #0f172a;
            color: white;
        }
        button {
            background: #3b82f6;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            margin: 10px 0;
            cursor: pointer;
            width: 100%;
        }
        audio {
            width: 100%;
            margin: 20px 0;
        }
        .status {
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-family: monospace;
        }
        .release-time {
            background: #10b981;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            margin: 10px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🧘 Тест аудио на iPhone</h1>
    
    <div class="release-time" id="releaseTime">
        Загрузка времени релиза...
    </div>
    
    <div class="status" id="status">
        Статус: Готов к работе
    </div>
    
    <button onclick="testButton()">
        🔘 Тест кнопки
    </button>
    
    <button onclick="testAudio()">
        🎵 Тест аудио (abc.m4a)
    </button>
    
    <button onclick="testAudio2()">
        🎵 Тест аудио (abca.m4a)
    </button>
    
    <audio id="player" controls>
        <source src="/sounds/abc.m4a" type="audio/mp4">
        Ваш браузер не поддерживает аудио
    </audio>
    
    <div class="status" id="log">
        Лог: Ожидание действий...
    </div>

    <script>
        let clickCount = 0;
        const statusDiv = document.getElementById('status');
        const logDiv = document.getElementById('log');
        const audioPlayer = document.getElementById('player');
        
        // Время релиза (фиксированное или из переменной окружения)
        const releaseDateTime = new Date('2026-04-13T12:00:00Z');
        const releaseTimeElement = document.getElementById('releaseTime');
        releaseTimeElement.textContent = `Релиз: ${releaseDateTime.toLocaleString()}`;
        
        function log(message) {
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<br>${time}: ${message}`;
            console.log(message);
        }
        
        function testButton() {
            clickCount++;
            statusDiv.innerHTML = `Статус: Кнопка нажата ${clickCount} раз`;
            log(`Кнопка нажата! Клик #${clickCount}`);
            alert(`Клик работает! (#${clickCount})`);
        }
        
        async function testAudio() {
            log('Пытаюсь воспроизвести abc.m4a...');
            try {
                const audio = new Audio('/sounds/abc.m4a');
                audio.setAttribute('playsinline', 'true');
                await audio.play();
                log('✅ abc.m4a успешно играет!');
                statusDiv.innerHTML = 'Статус: Аудио играет! 🎵';
            } catch (error) {
                log(`❌ Ошибка: ${error.message}`);
                statusDiv.innerHTML = `Статус: Ошибка - ${error.message}`;
            }
        }
        
        async function testAudio2() {
            log('Пытаюсь воспроизвести abca.m4a...');
            try {
                const audio = new Audio('/sounds/abca.m4a');
                audio.setAttribute('playsinline', 'true');
                await audio.play();
                log('✅ abca.m4a успешно играет!');
                statusDiv.innerHTML = 'Статус: Аудио играет! 🎵';
            } catch (error) {
                log(`❌ Ошибка: ${error.message}`);
                statusDiv.innerHTML = `Статус: Ошибка - ${error.message}`;
            }
        }
        
        // Проверяем поддержку форматов
        log('Страница загружена');
        log(`User Agent: ${navigator.userAgent}`);
        
        const audio = document.createElement('audio');
        const canPlayM4a = audio.canPlayType('audio/mp4');
        log(`Поддержка audio/mp4: ${canPlayM4a || 'нет'}`);
    </script>
</body>
</html>
