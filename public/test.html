<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Audio Test</title>
    <style>
        body { 
            background: #0f172a; 
            color: white; 
            font-family: system-ui; 
            padding: 20px;
            margin: 0;
        }
        button { 
            background: #3b82f6; 
            color: white; 
            padding: 20px; 
            margin: 10px 0;
            border: none; 
            border-radius: 12px; 
            font-size: 18px;
            width: 100%;
            cursor: pointer;
        }
        .status {
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>🧘 Тест аудио</h1>
    
    <div class="status" id="status">Готов к работе</div>
    
    <button id="btn1">
        🎵 Тест 1 (простой alert)
    </button>
    
    <button id="btn2">
        🎵 Тест 2 (прямой вызов Audio)
    </button>
    
    <button id="btn3">
        🎵 Тест 3 (создание элемента)
    </button>
    
    <audio id="player" controls style="width: 100%; margin-top: 20px;">
        <source src="/sounds/abc.m4a" type="audio/mp4">
    </audio>

    <script>
        const statusDiv = document.getElementById('status');
        
        // Тест 1: Простой alert
        document.getElementById('btn1').onclick = function() {
            statusDiv.innerHTML = '✅ Alert должен появиться';
            alert('Кнопка работает!');
            statusDiv.innerHTML = '✅ Alert сработал';
        };
        
        // Тест 2: Прямой вызов Audio
        document.getElementById('btn2').onclick = function() {
            statusDiv.innerHTML = 'Пытаюсь воспроизвести...';
            const audio = new Audio('/sounds/abc.m4a');
            audio.play()
                .then(() => {
                    statusDiv.innerHTML = '✅ Аудио играет!';
                })
                .catch(err => {
                    statusDiv.innerHTML = `❌ Ошибка: ${err.message}`;
                });
        };
        
        // Тест 3: Создание и добавление элемента
        document.getElementById('btn3').onclick = function() {
            statusDiv.innerHTML = 'Создаю аудио элемент...';
            const audio = document.createElement('audio');
            audio.src = '/sounds/abc.m4a';
            audio.controls = true;
            audio.style.width = '100%';
            audio.style.marginTop = '10px';
            document.body.appendChild(audio);
            audio.play()
                .then(() => {
                    statusDiv.innerHTML = '✅ Аудио создано и играет';
                })
                .catch(err => {
                    statusDiv.innerHTML = `❌ Ошибка: ${err.message}`;
                });
        };
        
        // Логирование
        console.log('Page loaded');
        statusDiv.innerHTML = 'Страница загружена, нажмите кнопку';
    </script>
</body>
</html>
