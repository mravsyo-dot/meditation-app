<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Test</title>
</head>
<body>
    <h1>Тест JavaScript</h1>
    <button onclick="testJS()">Нажми меня</button>
    <div id="result"></div>
    
    <script>
        function testJS() {
            document.getElementById('result').innerHTML = '✅ JS работает! Время: ' + new Date().toLocaleString();
            alert('✅ JS работает!');
        }
        
        // Автоматический тест
        document.getElementById('result').innerHTML = 'Страница загружена, JS активен. Время: ' + new Date().toLocaleString();
        console.log('JS loaded');
    </script>
</body>
</html>
